databases:
  - name: captador-db
    plan: free
    databaseName: captador
    user: captador_user

services:
  - type: web
    name: captador-cnpj
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 600 --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_SENHA
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: captador-db
          property: connectionString
